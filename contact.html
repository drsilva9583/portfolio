<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Diego Silva for software engineering opportunities, collaborations, or questions about his work.">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/contact.css">
    <title>Contact &mdash; Diego Silva</title>
</head>
<body>

    <!-- Navigation -->
    <header class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo"><span>DS</span></a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </header>

    <main>

        <div class="page-header reveal">
            <h1>Contact Me</h1>
            <p>Let's connect and collaborate!</p>
        </div>

        <section class="section">
            <div class="contact-wrapper reveal">
                <form id="contact-form" class="contact-form" action="https://formspree.io/f/mwvneawz" method="POST">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="number">Your Phone Number <span class="optional-tag">(Optional)</span></label>
                        <input type="tel" id="number" name="number" placeholder="(123) 456-7890">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Your message here..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>

                <div class="contact-alt">
                    <h2>Or reach me directly</h2>
                    <p><a href="mailto:diegos9583@gmail.com">diegos9583@gmail.com</a></p>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Diego Silva. All rights reserved.</p>
    </footer>

    <button type="button" class="scroll-to-top" data-scroll-to-top aria-label="Scroll back to top">&uarr;</button>
    <script src="scripts.js"></script>
</body>
</html>
